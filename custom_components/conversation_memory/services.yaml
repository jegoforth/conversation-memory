save_turn:
  name: Save conversation turn
  description: Save a user and assistant exchange with optional identity metadata.
  fields:
    conversation_id:
      required: true
      selector:
        text:
    user_text:
      required: true
      selector:
        text:
          multiline: true
    assistant_text:
      required: true
      selector:
        text:
          multiline: true
    session_id:
      selector:
        text:
    speaker_id:
      selector:
        text:
    person_id:
      selector:
        text:
    device_id:
      selector:
        text:
    room_id:
      selector:
        text:
    agent_id:
      selector:
        text:

recall:
  name: Recall previous Assist context
  description: Return relevant remembered turns for a query.
  fields:
    query:
      required: true
      selector:
        text:
          multiline: true
    limit:
      default: 5
      selector:
        number:
          min: 1
          max: 50
          mode: box
    speaker_id:
      selector:
        text:
    person_id:
      selector:
        text:
    conversation_id:
      selector:
        text:
    session_id:
      selector:
        text:

build_context:
  name: Build AI recall context
  description: Return prompt-ready context built from session summaries and supporting turns.
  fields:
    query:
      required: true
      selector:
        text:
          multiline: true
    limit:
      default: 5
      selector:
        number:
          min: 1
          max: 50
          mode: box
    speaker_id:
      selector:
        text:
    person_id:
      selector:
        text:
    conversation_id:
      selector:
        text:
    session_id:
      selector:
        text:

save_session_summary:
  name: Save session summary
  description: Save or replace a compact summary for a conversation session.
  fields:
    session_id:
      required: true
      selector:
        text:
    summary:
      required: true
      selector:
        text:
          multiline: true
    title:
      selector:
        text:
    started_at:
      selector:
        text:
    ended_at:
      selector:
        text:
    topics:
      selector:
        object:
    importance:
      default: 0
      selector:
        number:
          min: 0
          max: 10
          mode: slider
    related_turn_ids:
      selector:
        object:
    speaker_id:
      selector:
        text:
    person_id:
      selector:
        text:
    device_id:
      selector:
        text:
    room_id:
      selector:
        text:
    agent_id:
      selector:
        text:

search_sessions:
  name: Search session summaries
